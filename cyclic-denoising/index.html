<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Cyclic Denoising Reveals Ultrastable Memories in Diffusion Models</title>
  <meta name="description" content="Project page for 'Cyclic Denoising Reveals Ultrastable Memories in Diffusion Models'.">
  <style>
    :root {
      --fg: #1a1a1a;
      --muted: #555;
      --accent: #b3261e;
      --bg: #ffffff;
      --card: #fafafa;
      --border: #e6e6e6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.6;
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    header { border-bottom: 1px solid var(--border); padding-bottom: 24px; margin-bottom: 36px; }
    h1 { font-size: 1.6rem; line-height: 1.3; margin: 0 0 10px; }
    .authors { color: var(--muted); font-size: 1rem; margin: 0 0 4px; }
    .affil { color: var(--muted); font-size: 0.9rem; margin: 0; }
    .kicker {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 600;
      margin: 0 0 12px;
    }
    .coming {
      margin: 48px 0;
      padding: 40px 28px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: var(--card);
      text-align: center;
    }
    .coming .big {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0;
    }
    footer {
      border-top: 1px solid var(--border);
      margin-top: 24px;
      padding-top: 20px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="kicker">Project Page</p>
      <h1>Cyclic Denoising Reveals Ultrastable Memories in Diffusion Models</h1>
      <p class="authors">Rishabh Sharma, Stefano Martiniani</p>
      <p class="affil">New York University</p>
    </header>

    <div class="coming">
      <p class="big">Project page coming soon.</p>
    </div>

    <footer>
      &ldquo;Cyclic Denoising Reveals Ultrastable Memories in Diffusion Models.&rdquo;
    </footer>
  </div>
</body>
</html>
